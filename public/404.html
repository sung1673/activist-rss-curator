<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>페이지를 찾을 수 없습니다 - 주주·자본시장 데일리</title>
  <style>
    :root {
      --ink: #17131f;
      --muted: #6f6878;
      --line: #ded7e8;
      --paper: #fbfafc;
      --surface: #ffffff;
      --accent: #6b35d8;
      --accent-deep: #42207e;
      --accent-soft: #f0eafb;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.58;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 24px 72px;
    }
    .brand-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 56px;
    }
    .bside-logo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--accent);
      text-decoration: none;
    }
    .bside-logo__image {
      width: 92px;
      height: 24px;
      display: block;
      background: var(--accent);
      -webkit-mask: url("https://bside.ai/images/icons/bside-logo-gray.svg") center / contain no-repeat;
      mask: url("https://bside.ai/images/icons/bside-logo-gray.svg") center / contain no-repeat;
    }
    .bside-logo__label {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .12em;
      color: var(--accent);
    }
    .edition {
      color: var(--muted);
      font-size: 13px;
    }
    .not-found {
      border-top: 3px solid var(--ink);
      border-bottom: 1px solid var(--line);
      padding: 34px 0 44px;
    }
    .eyebrow {
      color: var(--accent);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      margin: 0 0 16px;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(44px, 8vw, 82px);
      line-height: .96;
      letter-spacing: 0;
      margin: 0 0 18px;
      max-width: 780px;
    }
    p {
      max-width: 680px;
      margin: 0;
      color: #322b3d;
      font-size: 18px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }
    .action {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 14px;
      background: var(--surface);
      color: var(--accent-deep);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }
    .action--primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    footer {
      margin-top: 36px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 720px) {
      main { padding: 20px 16px 52px; }
      .brand-row { align-items: flex-start; flex-direction: column; margin-bottom: 42px; }
      p { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="brand-row">
      <a class="bside-logo" href="https://bside.ai" aria-label="BSIDE Korea 홈페이지">
        <span class="bside-logo__image" aria-hidden="true"></span>
        <span class="bside-logo__label">DAILY NEWS</span>
      </a>
      <div class="edition">404</div>
    </div>
    <section class="not-found">
      <p class="eyebrow">PAGE NOT FOUND</p>
      <h1>요청한 페이지를 찾을 수 없습니다.</h1>
      <p>주소가 바뀌었거나 아직 발행되지 않은 데일리일 수 있습니다. 최신 주주·자본시장 데일리와 RSS 피드는 아래에서 확인할 수 있습니다.</p>
      <div class="actions">
        <a class="action action--primary" href="/feed/latest.html">최신 데일리 보기</a>
        <a class="action" href="/feed/index.html">다른 일자 보기</a>
        <a class="action" href="/feed.xml">RSS 보기</a>
      </div>
    </section>
    <footer>건강한 자본시장을 위한 주주행동, 지배구조, 밸류업, 자본시장 제도 뉴스를 정리합니다.</footer>
  </main>
</body>
</html>
