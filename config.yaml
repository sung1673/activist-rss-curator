public_feed_url: "https://sung1673.github.io/activist-rss-curator/feed.xml"
timezone: "Asia/Seoul"

fetch:
  max_entries_per_feed: 8
  enrich_pages: true
  page_timeout_seconds: 8
  google_news_decode_limit: 25

display:
  exclude_link_domains:
    - msn.com

date_filter:
  max_article_age_days: 7
  allow_unknown_date: true

cluster:
  buffer_minutes_default: 45
  buffer_minutes_high: 20
  max_pending_hours: 3
  cluster_window_hours: 48
  theme_group_window_hours: 168
  max_links_per_item: 7
  max_description_chars: 3500

dedupe:
  title_duplicate_threshold: 92
  title_cluster_threshold: 80
  summary_cluster_threshold: 85
  seen_history_days: 90

publish:
  max_items_in_feed: 50
  publish_levels:
    - high
    - medium

telegram:
  enabled: true
  chat_id: "@o2fjwoei"
  parse_mode: "HTML"
  disable_web_page_preview: true
  max_articles_per_message: 7
  max_message_chars: 3900
  send_old_on_first_run: false
  timeout_seconds: 20

ai:
  enabled: true
  provider: "github_models"
  endpoint: "https://models.github.ai/inference/chat/completions"
  timeout_seconds: 25
  cluster_summary_enabled: true
  cluster_summary_model: "openai/gpt-4o-mini"
  cluster_summary_max_tokens: 180
  cluster_summary_max_clusters_per_run: 8
  daily_digest_enabled: true
  daily_digest_model: "openai/gpt-4.1"
  daily_digest_max_tokens: 900

digest:
  enabled: true
  send_hour: 7
  send_window_minutes: 59
  window_hours: 24
  max_clusters: 30
  max_articles_per_cluster: 5
  max_message_chars: 3900
