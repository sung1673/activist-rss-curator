name: Build curated RSS feed

on:
  push:
    branches:
      - main
    paths-ignore:
      - "public/feed.xml"
      - "public/index.html"
      - "data/state.json"
  schedule:
    # KST 06:30: prepare and send the daily governance review.
    - cron: "30 21 * * *"
    # KST 07:00-23:45: every 15 minutes.
    - cron: "*/15 0-14,22-23 * * *"
    # KST 00:00-06:00: hourly.
    - cron: "0 15-21 * * *"
  workflow_dispatch:
    inputs:
      send_telegram_test:
        description: "Send a Telegram smoke-test message"
        required: false
        type: boolean
        default: false
      send_digest_preview:
        description: "Send a daily digest preview message"
        required: false
        type: boolean
        default: false
      digest_preview_hours:
        description: "Digest preview lookback hours"
        required: false
        type: string
        default: "24"
      digest_preview_prefix:
        description: "Digest preview prefix. Use NONE to send without a preview prefix."
        required: false
        type: string
        default: "[미리보기] "
      resend_recent_articles:
        description: "Resend recently sent Telegram article clusters with current formatting"
        required: false
        type: boolean
        default: false
      resend_recent_article_count:
        description: "Number of recent sent article clusters to resend"
        required: false
        type: string
        default: "1"

permissions:
  contents: write
  models: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-feed:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Send Telegram smoke test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_telegram_test }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.telegram_smoke_test

      - name: Build feed
        env:
          CURATOR_FEEDS: ${{ secrets.CURATOR_FEEDS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.main

      - name: Send digest preview
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_digest_preview }}
        env:
          CURATOR_FEEDS: ${{ secrets.CURATOR_FEEDS }}
          DIGEST_PREVIEW_HOURS: ${{ inputs.digest_preview_hours }}
          DIGEST_PREVIEW_PREFIX: ${{ inputs.digest_preview_prefix }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.digest_preview

      - name: Resend recent Telegram articles
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.resend_recent_articles }}
        env:
          TELEGRAM_RESEND_COUNT: ${{ inputs.resend_recent_article_count }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.telegram_resend

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/feed.xml public/index.html data/state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update curated RSS feed"
            git push
          fi

      - name: Configure Pages
        if: vars.ENABLE_PAGES == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: vars.ENABLE_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: vars.ENABLE_PAGES == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
