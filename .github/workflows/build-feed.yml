name: Build curated RSS feed

on:
  push:
    branches:
      - main
    paths-ignore:
      - "public/feed.xml"
      - "public/index.html"
      - "data/state.json"
  schedule:
    # KST every 30 minutes at :05/:35, skipping 06:00-07:59 regular updates.
    - cron: "5,35 0-20,23 * * *"
  workflow_dispatch:
    inputs:
      send_telegram_test:
        description: "Send a Telegram smoke-test message"
        required: false
        type: boolean
        default: false
      resend_last_briefing:
        description: "Resend the latest periodic Telegram briefing with current formatting"
        required: false
        type: boolean
        default: false
      resend_recent_articles:
        description: "Resend recently sent Telegram article clusters with current formatting"
        required: false
        type: boolean
        default: false
      resend_recent_article_count:
        description: "Number of recent sent article clusters to resend"
        required: false
        type: string
        default: "1"
      resend_cluster_guid:
        description: "Optional exact cluster guid to resend"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  models: read
  pages: write
  id-token: write

concurrency:
  group: build-feed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-feed:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Send Telegram smoke test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_telegram_test }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.telegram_smoke_test

      - name: Build feed
        env:
          CURATOR_FEEDS: ${{ secrets.CURATOR_FEEDS }}
          CURATOR_EVENT_SCHEDULE: ${{ github.event.schedule }}
          CURATOR_DISABLE_TELEGRAM_SEND: ${{ github.event_name == 'push' && contains(github.event.head_commit.message, '[resend-last-briefing]') && '1' || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.main

      - name: Resend last Telegram briefing
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.resend_last_briefing) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[resend-last-briefing]')) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.telegram_resend_digest

      - name: Resend recent Telegram articles
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.resend_recent_articles }}
        env:
          TELEGRAM_RESEND_COUNT: ${{ inputs.resend_recent_article_count }}
          TELEGRAM_RESEND_GUID: ${{ inputs.resend_cluster_guid }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.telegram_resend

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/feed.xml public/index.html data/state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update curated RSS feed"
            git push
          fi

      - name: Configure Pages
        if: vars.ENABLE_PAGES == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: vars.ENABLE_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: vars.ENABLE_PAGES == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
