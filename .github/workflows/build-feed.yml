name: Build curated RSS feed

on:
  push:
    branches:
      - main
    paths-ignore:
      - "public/feed.xml"
      - "public/index.html"
      - "data/state.json"
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-feed:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Build feed
        env:
          CURATOR_FEEDS: ${{ secrets.CURATOR_FEEDS }}
        run: python -m curator.main

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/feed.xml public/index.html data/state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update curated RSS feed"
            git push
          fi

      - name: Configure Pages
        if: vars.ENABLE_PAGES == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: vars.ENABLE_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: vars.ENABLE_PAGES == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
