name: Build curated RSS feed

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-feed.yml"
      - "config.yaml"
      - "requirements.txt"
      - "curator/**"
      - "tests/**"
      - "public/404.html"
  schedule:
    # KST 08:05-00:35 every 30 minutes.
    - cron: "5,35 0-15,23 * * *"
    # KST 03:35, covering the first half of the overnight 01:00-06:00 window.
    - cron: "35 18 * * *"
    # KST 06:05, covering the second half of the overnight 01:00-06:00 window.
    - cron: "5 21 * * *"
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Execution mode. Use page_only for layout/template-only deploys without article collection."
        required: false
        type: choice
        default: auto
        options:
          - auto
          - full
          - page_only
      send_telegram_test:
        description: "Send a Telegram smoke-test message"
        required: false
        type: boolean
        default: false
      resend_last_briefing:
        description: "Resend the latest periodic Telegram briefing with current formatting"
        required: false
        type: boolean
        default: false
      resend_recent_articles:
        description: "Resend recently sent Telegram article clusters with current formatting"
        required: false
        type: boolean
        default: false
      resend_recent_article_count:
        description: "Number of recent sent article clusters to resend"
        required: false
        type: string
        default: "1"
      resend_cluster_guid:
        description: "Optional exact cluster guid to resend"
        required: false
        type: string
        default: ""
      send_daily_report:
        description: "Build a 24-hour HTML daily report and send a Telegram briefing link"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  models: read
  pages: write
  id-token: write

concurrency:
  group: build-feed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-feed:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine run mode
        id: run_mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
          DISPATCH_MODE: ${{ github.event.inputs.run_mode || 'auto' }}
        run: |
          set -euo pipefail

          full_run=false
          page_run=false

          if [[ "$EVENT_NAME" == "schedule" ]]; then
            full_run=true
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            case "$DISPATCH_MODE" in
              page_only)
                page_run=true
                ;;
              full|auto|"")
                full_run=true
                ;;
              *)
                echo "Unknown run_mode=$DISPATCH_MODE; defaulting to full"
                full_run=true
                ;;
            esac
          elif [[ "$EVENT_NAME" == "push" ]]; then
            if [[ "$COMMIT_MESSAGE" == *"[page-only]"* ]]; then
              page_run=true
            elif [[ "$COMMIT_MESSAGE" == *"[force-collect]"* || "$COMMIT_MESSAGE" == *"[send-regular-update]"* ]]; then
              full_run=true
            else
              base="$EVENT_BEFORE"
              if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
                base="$(git rev-parse HEAD^ 2>/dev/null || true)"
              fi

              if [[ -n "$base" ]]; then
                if ! git diff --name-only "$base" "$GITHUB_SHA" > changed_files.txt 2>/tmp/diff_error; then
                  echo "Base commit $base is not in the shallow checkout; fetching more history"
                  git fetch --no-tags --deepen=50 origin "${GITHUB_REF#refs/heads/}" || true
                  git diff --name-only "$base" "$GITHUB_SHA" > changed_files.txt 2>/tmp/diff_error || git show --format= --name-only "$GITHUB_SHA" > changed_files.txt
                fi
              else
                git show --format= --name-only "$GITHUB_SHA" > changed_files.txt
              fi

              echo "Changed files:"
              cat changed_files.txt

              collection_regex='^(config\.yaml|requirements\.txt|curator/(ai|cluster|config|dates|dedupe|fetch|main|normalize|relevance|rss_writer|state|story_judge|summaries|telegram_publisher|telegram_resend|telegram_resend_digest|telegram_smoke_test)\.py|tests/(conftest|test_cluster|test_config|test_dates|test_dedupe|test_fetch|test_main|test_normalize|test_relevance|test_rss_writer|test_state|test_story_judge|test_summaries|test_telegram_publisher|test_telegram_resend_digest)\.py)$'
              page_regex='^(\.github/workflows/build-feed\.yml|curator/daily_report\.py|tests/test_daily_report\.py|public/404\.html)$'

              if grep -Eq "$collection_regex" changed_files.txt; then
                full_run=true
              fi
              if grep -Eq "$page_regex" changed_files.txt; then
                page_run=true
              fi
            fi
          fi

          echo "full=$full_run" >> "$GITHUB_OUTPUT"
          echo "page=$page_run" >> "$GITHUB_OUTPUT"
          echo "Run mode: full=$full_run page=$page_run"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Send Telegram smoke test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_telegram_test }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.telegram_smoke_test

      - name: Build feed
        if: ${{ steps.run_mode.outputs.full == 'true' }}
        env:
          CURATOR_FEEDS: ${{ secrets.CURATOR_FEEDS }}
          CURATOR_EVENT_SCHEDULE: ${{ github.event.schedule }}
          CURATOR_DISABLE_TELEGRAM_SEND: ${{ github.event_name == 'push' && ! contains(github.event.head_commit.message, '[send-regular-update]') && '1' || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.main

      - name: Build daily report page
        if: ${{ steps.run_mode.outputs.page == 'true' || (github.event_name == 'workflow_dispatch' && inputs.send_daily_report) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[send-daily-report]')) }}
        env:
          CURATOR_DAILY_REPORT_WRITE_ONLY: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m curator.daily_report

      - name: Resend last Telegram briefing
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.resend_last_briefing) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[resend-last-briefing]')) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.telegram_resend_digest

      - name: Resend recent Telegram articles
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.resend_recent_articles }}
        env:
          TELEGRAM_RESEND_COUNT: ${{ inputs.resend_recent_article_count }}
          TELEGRAM_RESEND_GUID: ${{ inputs.resend_cluster_guid }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.telegram_resend

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/CNAME public/404.html public/feed.xml public/index.html public/feed data/state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update curated RSS feed"
            git push
          fi

      - name: Configure Pages
        if: vars.ENABLE_PAGES == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: vars.ENABLE_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: vars.ENABLE_PAGES == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send daily report message
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.send_daily_report) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[send-daily-report]')) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m curator.daily_report
